services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance
    ports:
      - '5432:5432'
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/finance?schema=public
      SESSION_SECRET: dev-secret-please-change-32-bytes-min
      WEB_ORIGIN: http://localhost:5173
      DEFAULT_CURRENCY: USD
      SIGNUP_ENABLED: 'true'
      LOG_LEVEL: info
      PORT: 4000
    ports:
      - '4000:4000'

volumes:
  dbdata:
